name: Regenerate downloads page

# Regenerate the by-organism annotation downloads page
# (_docs/download-go-annotations-downloads.html) from go-site goex.yaml +
# current.geneontology.org, and open a PR with any change.
#
# This is the implementation half of the release-process step tracked in
# geneontology/pipeline#396: the *artifact* is a website page served from
# geneontology.org, so it stays here; the *trigger* lives with the release
# process (e.g. `just downloads-regen` in pipeline-from-goa, which calls
# `gh workflow run update-downloads.yaml`). It can also be run by hand from the
# Actions tab.
#
# A human merges the resulting PR; that merge (a normal push to master) triggers
# the existing "Deploy Jekyll site to Pages" workflow, which publishes it. The PR
# is deliberate: it gives the regenerated public page a review gate, and avoids
# the GITHUB_TOKEN "pushes don't trigger workflows" deploy gap.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Note for the PR body (e.g. 'release 2026-06-19')"
        required: false
        default: "manual"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: downloads-regen
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate the downloads page
        run: python3 scripts/update_downloads.py

      - name: Open a PR if the page changed
        env:
          GH_TOKEN: ${{ github.token }}
          REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail
          page=_docs/download-go-annotations-downloads.html
          if git diff --quiet -- "$page"; then
            echo "No change in $page — nothing to publish."
            exit 0
          fi
          ts=$(date -u +%Y%m%d-%H%M%S)
          branch="downloads-regen-$ts"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add -- "$page"
          git commit -m "Regenerate downloads page ($REASON)"
          git push origin "$branch"
          gh pr create --base master --head "$branch" \
            --title "Regenerate downloads page ($REASON)" \
            --body "Auto-regenerated by \`.github/workflows/update-downloads.yaml\` from go-site \`goex.yaml\` + \`current.geneontology.org\` (geneontology/pipeline#396). Review the diff and **merge to deploy** — the merge triggers the Pages build. Trigger: $REASON."
